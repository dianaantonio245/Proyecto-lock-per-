<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOCK Cotizaciones</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#EEF2F7;
}

/* LOGIN */

#login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:380px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.logo{
    width:180px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:1px solid #D1D5DB;
    border-radius:10px;
    box-sizing:border-box;
}

input:focus{
    outline:none;
    border-color:#0F2544;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    background:#0F2544;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#173763;
}

#error{
    color:red;
    display:none;
    margin-top:10px;
}

/* APP */

#app{
    display:none;
    min-height:100vh;
}

header{
    background:#0F2544;
    color:white;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo-header{
    width:100px;
}

.main{
    padding:30px;
}

.bienvenida{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
    margin-bottom:20px;
}

.bienvenida h2{
    color:#0F2544;
    margin-top:0;
}

.opcion{
    display:block;
    margin-top:15px;
    font-size:18px;
}

.opcion input{
    width:auto;
    margin-right:10px;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">

    <div class="card">

        <img src="Logo Lock d&n fase 1 7.png" class="logo">

        <h2>LOCK Cotizaciones</h2>

        <input
            type="email"
            id="email"
            placeholder="nombre@dichter-neira.com">

        <button onclick="login()">
            Ingresar
        </button>

        <div id="error">
            Solo correos @dichter-neira.com
        </div>

    </div>

</div>

<!-- APP -->
<div id="app">

    <header>

        <div class="header-left">

            <img src="Logo Lock d&n fase 1 7.png"
                 class="logo-header">

            <div>
                <h1>LOCK Cotizaciones</h1>
                <p>Dichter & Neira</p>
            </div>

        </div>

        <div id="user"></div>

    </header>

    <div class="main">

        <!-- Selección -->
        <div class="bienvenida">

            <h2>Seleccione la metodología</h2>

            <label class="opcion">

                <input
                    type="radio"
                    name="metodologia"
                    value="retail"
                    onchange="cambiarMetodologia()">

                Retail

            </label>

            <label class="opcion">

                <input
                    type="radio"
                    name="metodologia"
                    value="tradicional"
                    onchange="cambiarMetodologia()">

                Tradicional

            </label>

        </div>

        <!-- Retail -->
        <div id="retail-form"
             class="bienvenida"
             style="display:none;">

            <h2>Cotizador Retail</h2>

            <p>
                Aquí construiremos la tabla Retail
                igual al Excel.
            </p>

        </div>

        <!-- Tradicional -->
        <div id="tradicional-form"
             class="bienvenida"
             style="display:none;">

            <h2>Cotizador Tradicional</h2>

            <p>
                Aquí construiremos el formulario
                Tradicional igual al Excel.
            </p>

        </div>

    </div>

</div>

<script>

function login(){

    const email =
        document.getElementById("email")
        .value
        .trim()
        .toLowerCase();

    if(!email.endsWith("@dichter-neira.com")){

        document.getElementById("error")
        .style.display = "block";

        return;
    }

    localStorage.setItem("user", email);

    mostrarApp(email);
}

function mostrarApp(usuario){

    document.getElementById("login")
        .style.display = "none";

    document.getElementById("app")
        .style.display = "block";

    document.getElementById("user")
        .innerText = usuario;
}

window.onload = () => {

    const user = localStorage.getItem("user");

    if(user &&
       user.endsWith("@dichter-neira.com")){

        mostrarApp(user);
    }

};

function cambiarMetodologia(){

    const metodologia =
        document.querySelector(
            'input[name="metodologia"]:checked'
        ).value;

    document.getElementById("retail-form")
        .style.display = "none";

    document.getElementById("tradicional-form")
        .style.display = "none";

    if(metodologia === "retail"){

        document.getElementById("retail-form")
            .style.display = "block";

    }

    if(metodologia === "tradicional"){

        document.getElementById("tradicional-form")
            .style.display = "block";

    }
}

</script>

</body>
</html>
