<script>

let bdTradicional = [];
let bdRetail = [];

async function cargarBases(){

    try{

        const tradicional =
        await fetch(
            "data/tradicional.json"
        );

        bdTradicional =
        await tradicional.json();

        const retail =
        await fetch(
            "data/retail.json"
        );

        bdRetail =
        await retail.json();

        console.log(
            "Tradicional",
            bdTradicional.length
        );

        console.log(
            "Retail",
            bdRetail.length
        );

    }catch(error){

        console.error(error);

        alert(
            "No se pudieron cargar los JSON"
        );

    }

}

function login(){

    const email =
    document
    .getElementById("email")
    .value
    .trim()
    .toLowerCase();

    if(
        !email.endsWith(
            "@dichter-neira.com"
        )
    ){

        document
        .getElementById("error")
        .style.display="block";

        return;

    }

    localStorage.setItem(
        "dn-user",
        email
    );

    showApp();

}

function showApp(){

    const email =
    localStorage.getItem(
        "dn-user"
    );

    if(!email){
        return;
    }

    document
    .getElementById(
        "login-screen"
    )
    .style.display="none";

    document
    .getElementById(
        "app"
    )
    .style.display="block";

    document
    .getElementById(
        "userName"
    )
    .innerText=email;

}

function obtenerBase(){

    const canal =
    document
    .getElementById(
        "canal"
    )
    .value;

    return canal === "retail"
    ? bdRetail
    : bdTradicional;

}

function obtenerCategorias(){

    const bd =
    obtenerBase();

    return bd.map(
        item => item.categoria
    );

}

function crearSelectCategorias(){

    const categorias =
    obtenerCategorias();

    let html = "";

    categorias.forEach(cat => {

        html += `
        <option value="${cat}">
            ${cat}
        </option>
        `;

    });

    return html;

}

function agregarLinea(){

    const tbody =
    document.getElementById(
        "tbodyCotizacion"
    );

    const fila =
    document.createElement("tr");

    fila.innerHTML = `

    <td>

        <select
        class="categoria"
        onchange="actualizarServicios(this)">

            ${crearSelectCategorias()}

        </select>

    </td>

    <td>

        <select
        class="servicio">
        </select>

    </td>

    <td>

        <input
        type="number"
        value="100"
        class="cantidad">

    </td>

    <td class="subtotal">

        $0

    </td>

    <td>

        <button
        onclick="eliminarFila(this)">
        X
        </button>

    </td>

    `;

    tbody.appendChild(fila);

    const categoria =
    fila.querySelector(
        ".categoria"
    );

    actualizarServicios(
        categoria
    );

}

function actualizarServicios(selectCategoria){

    const fila =
    selectCategoria.closest("tr");

    const servicioSelect =
    fila.querySelector(
        ".servicio"
    );

    const categoria =
    selectCategoria.value;

    const bd =
    obtenerBase();

    const registro =
    bd.find(
        x => x.categoria === categoria
    );

    if(!registro){
        return;
    }

    servicioSelect.innerHTML = "";

    Object.keys(
        registro
    ).forEach(campo => {

        if(
            campo !== "categoria"
        ){

            servicioSelect.innerHTML += `
            <option value="${campo}">
                ${campo}
            </option>
            `;

        }

    });

}

function eliminarFila(btn){

    btn
    .closest("tr")
    .remove();

    calcularTotal();

}

showApp();

cargarBases();
function obtenerPrecio(categoria, servicio){

    const bd =
    obtenerBase();

    const registro =
    bd.find(
        x => x.categoria === categoria
    );

    if(!registro){
        return 0;
    }

    return Number(
        registro[servicio] || 0
    );

}

function calcularFila(fila){

    const categoria =
    fila.querySelector(
        ".categoria"
    ).value;

    const servicio =
    fila.querySelector(
        ".servicio"
    ).value;

    const cantidad =
    Number(
        fila.querySelector(
            ".cantidad"
        ).value
    );

    const precio =
    obtenerPrecio(
        categoria,
        servicio
    );

    const subtotal =
    precio * cantidad;

    fila.querySelector(
        ".subtotal"
    ).innerHTML =

    "$" +
    subtotal.toLocaleString(
        "es-PE",
        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }
    );

    return subtotal;

}

function calcularTotal(){

    let total = 0;

    document
    .querySelectorAll(
        "#tbodyCotizacion tr"
    )
    .forEach(fila => {

        total +=
        calcularFila(
            fila
        );

    });

    document
    .getElementById(
        "totalGeneral"
    )
    .innerHTML =

    "Total: $" +

    total.toLocaleString(
        "es-PE",
        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }
    );

}

document.addEventListener(
    "change",
    function(e){

        if(
            e.target.classList.contains("categoria")
        ){

            actualizarServicios(
                e.target
            );

            calcularTotal();

        }

        if(
            e.target.classList.contains("servicio")
        ){

            calcularTotal();

        }

        if(
            e.target.classList.contains("cantidad")
        ){

            calcularTotal();

        }

    }
);

document.addEventListener(
    "input",
    function(e){

        if(
            e.target.classList.contains("cantidad")
        ){

            calcularTotal();

        }

    }
);

const originalAgregarLinea =
agregarLinea;

agregarLinea = function(){

    originalAgregarLinea();

    const filas =
    document.querySelectorAll(
        "#tbodyCotizacion tr"
    );

    const ultima =
    filas[
        filas.length - 1
    ];

    calcularFila(
        ultima
    );

    calcularTotal();

};
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">script>
let contadorCotizacion = 1;

function generarNumeroCotizacion(){

    const numero =
    String(
        contadorCotizacion
    ).padStart(
        5,
        "0"
    );

    return "LOCK-" + numero;

}

function descargarPDF(){

    const { jsPDF } =
    window.jspdf;

    const doc =
    new jsPDF();

    const numeroCotizacion =
    generarNumeroCotizacion();

    const fecha =
    new Date()
    .toLocaleDateString(
        "es-PE"
    );

    const cliente =
    document
    .getElementById(
        "cliente"
    )
    .value;

    const vendedor =
    document
    .getElementById(
        "vendedor"
    )
    .value;

    const canal =
    document
    .getElementById(
        "canal"
    )
    .value;

    let y = 20;

    doc.setFontSize(20);

    doc.text(
        "LOCK COTIZACIONES",
        20,
        y
    );

    y += 12;

    doc.setFontSize(11);

    doc.text(
        numeroCotizacion,
        20,
        y
    );

    y += 8;

    doc.text(
        "Fecha: " + fecha,
        20,
        y
    );

    y += 8;

    doc.text(
        "Cliente: " + cliente,
        20,
        y
    );

    y += 8;

    doc.text(
        "Canal: " + canal,
        20,
        y
    );

    y += 8;

    doc.text(
        "Vendedor: " + vendedor,
        20,
        y
    );

    y += 15;

    doc.setFontSize(12);

    doc.text(
        "DETALLE",
        20,
        y
    );

    y += 10;

    document
    .querySelectorAll(
        "#tbodyCotizacion tr"
    )
    .forEach(fila => {

        const categoria =
        fila.querySelector(
            ".categoria"
        ).value;

        const servicio =
        fila.querySelector(
            ".servicio"
        ).value;

        const cantidad =
        fila.querySelector(
            ".cantidad"
        ).value;

        const subtotal =
        fila.querySelector(
            ".subtotal"
        ).innerText;

        doc.text(
            categoria +
            " | " +
            servicio +
            " | " +
            cantidad +
            " | " +
            subtotal,
            20,
            y
        );

        y += 8;

    });

    y += 10;

    const total =
    document
    .getElementById(
        "totalGeneral"
    )
    .innerText;

    doc.setFontSize(16);

    doc.text(
        total,
        20,
        y
    );

    doc.setTextColor(
        220,
        220,
        220
    );

    doc.setFontSize(
        50
    );

    doc.text(
        "LOCK",
        50,
        180,
        {
            angle:45
        }
    );

    doc.save(
        numeroCotizacion +
        ".pdf"
    );

    contadorCotizacion++;

}
  <button
class="btn-primary"
onclick="descargarPDF()"
style="margin-top:20px;">
Descargar Cotización PDF
</button>
