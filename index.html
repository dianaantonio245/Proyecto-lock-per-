
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOCK Cotizaciones</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0F2544;
}

#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:40px;
border-radius:16px;
text-align:center;
width:350px;
}

img{
width:200px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
margin-top:15px;
padding:10px;
background:#0F2544;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#error{
color:red;
display:none;
margin-top:10px;
}

#app{
display:none;
color:white;
text-align:center;
padding-top:100px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <img src="Logo Lock d&n fase 1 7.png">
    <h2>LOCK Cotizaciones</h2>

    <input type="email" id="email" placeholder="nombre@dichter-neira.com">

    <button onclick="login()">Ingresar</button>

    <div id="error">Solo correos @dichter-neira.com</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <h1>Bienvenido a LOCK</h1>
  <p id="user"></p>
</div>

<script>

function login(){

    const email =
    document.getElementById("email").value.trim().toLowerCase();

    if(!email.endsWith("@dichter-neira.com")){
        document.getElementById("error").style.display = "block";
        return;
    }

    localStorage.setItem("user", email);

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("user").innerText = email;
}

// auto login si ya estaba guardado
window.onload = () => {

    const user = localStorage.getItem("user");

    if(user && user.endsWith("@dichter-neira.com")){
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("user").innerText = user;
    }

};

</script>

</body>
</html>
