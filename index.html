<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOCK Cotizaciones</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#f4f6f9;
color:#1a1a1a;
}

#login-screen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0F2544;
}

.login-card{
background:white;
padding:40px;
border-radius:20px;
width:100%;
max-width:420px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,.15);
}

.logo{
width:220px;
margin-bottom:20px;
}

h1{
font-size:24px;
margin-bottom:10px;
color:#0F2544;
}

.subtitle{
color:#6b7280;
margin-bottom:25px;
font-size:14px;
}

input,
select{
width:100%;
padding:12px;
border:1px solid #d1d5db;
border-radius:10px;
margin-bottom:15px;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#0F2544;
color:white;
font-weight:600;
cursor:pointer;
}

.error{
color:#dc2626;
display:none;
margin-top:10px;
}

#app{
display:none;
}

.topbar{
height:70px;
background:#0F2544;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
color:white;
}

.user{
background:rgba(255,255,255,.15);
padding:8px 14px;
border-radius:999px;
font-size:13px;
}

.main{
padding:30px;
}

.welcome{
background:white;
padding:30px;
border-radius:15px;
border:1px solid #e5e7eb;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

#resultadoCotizacion{
display:none;
margin-top:20px;
padding:20px;
background:#f9fafb;
border-radius:12px;
border:1px solid #e5e7eb;
}

</style>

</head>

<body>

<div id="login-screen">

<div class="login-card">

<img
src="Logo Lock d&n fase 1 7.png"
class="logo">

<h1>LOCK Cotizaciones</h1>

<p class="subtitle">
Ingresa tu correo corporativo
</p>

<input
type="email"
id="email"
placeholder="nombre@dichter-neira.com">

<button onclick="login()">
Ingresar
</button>

<div class="error" id="error">
Solo se permiten correos @dichter-neira.com
</div>

</div>

</div>

<div id="app">

<div class="topbar">

<div>
<h3>LOCK</h3>
<small>by dichter & neira</small>
</div>

<div class="user" id="userName">
Usuario
</div>

</div>

<div class="main">

<div class="welcome">

<h2>Nueva Cotización</h2>

<p>
Genera una cotización para Canal Tradicional o Retail.
</p>

<div class="grid">

<div>
<label>Cliente</label>
<input id="cliente">
</div>

<div>
<label>País</label>
<input id="pais" value="Perú">
</div>

<div>
<label>Vendedor</label>
<input id="vendedor">
</div>

<div>
<label>Canal</label>
<select id="canal">
<option value="tradicional">
Tradicional
</option>

<option value="retail">
Retail
</option>
</select>
</div>

<div>
<label>Categoría</label>
<select id="categoria">
<option>Aceites</option>
<option>Aguas</option>
<option>Arroz</option>
<option>Bebibles</option>
<option>Bocaditos</option>
</select>
</div>

<div>
<label>Servicio</label>
<select id="servicio">
<option>Audit Consumo</option>
<option>Chequeo</option>
<option>Exhibicion Lima</option>
</select>
</div>

<div>
<label>Cantidad</label>
<input
id="cantidad"
type="number"
value="100">
</div>

</div>

<button
onclick="calcularCotizacion()">
Calcular Cotización
</button>

<div id="resultadoCotizacion"></div>

</div>

</div>

</div>
<script>

function login(){

const email =
document
.getElementById("email")
.value
.trim()
.toLowerCase();

if(
!email.endsWith(
"@dichter-neira.com"
)
){
document
.getElementById("error")
.style.display="block";
return;
}

localStorage.setItem(
"dn-user",
email
);

showApp();

}

function showApp(){

const email =
localStorage.getItem(
"dn-user"
);

if(!email){
return;
}

document
.getElementById(
"login-screen"
)
.style.display="none";

document
.getElementById(
"app"
)
.style.display="block";

document
.getElementById(
"userName"
)
.innerText=email;

}

function calcularCotizacion(){

const cliente =
document.getElementById(
"cliente"
).value;

const canal =
document.getElementById(
"canal"
).value;

const categoria =
document.getElementById(
"categoria"
).value;

const servicio =
document.getElementById(
"servicio"
).value;

const cantidad =
Number(
document.getElementById(
"cantidad"
).value
);

let precio = 0;

if(
categoria==="Aceites" &&
servicio==="Audit Consumo"
){
precio = 7.21;
}

if(
categoria==="Aceites" &&
servicio==="Chequeo"
){
precio = 5.18;
}

if(
categoria==="Aguas" &&
servicio==="Audit Consumo"
){
precio = 5.40;
}

if(
categoria==="Aguas" &&
servicio==="Exhibicion Lima"
){
precio = 15.69;
}

const total =
precio * cantidad;

document
.getElementById(
"resultadoCotizacion"
)
.style.display="block";

document
.getElementById(
"resultadoCotizacion"
)
.innerHTML = `

<h3>Resumen de Cotización</h3>

<p><b>Cliente:</b> ${cliente}</p>

<p><b>Canal:</b> ${canal}</p>

<p><b>Categoría:</b> ${categoria}</p>

<p><b>Servicio:</b> ${servicio}</p>

<p><b>Cantidad:</b> ${cantidad}</p>

<p><b>Precio Unitario:</b> $${precio}</p>

<hr>

<h2>Total: $${total.toFixed(2)}</h2>

`;

}

showApp();

</script>

</body>
</html>
